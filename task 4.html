<!DOCTYPE html>
<html>
<head>
<title>Productivity Tracker</title>

<style>
body{font-family:Arial;background:#121212;color:white;text-align:center;}
.box{width:500px;margin:auto;margin-top:40px;background:#1e1e1e;padding:20px;border-radius:10px;}
button{padding:10px;background:#00ff99;border:none;}
.card{background:#2d2d2d;margin:10px;padding:10px;border-radius:8px;}
.good{color:#00ff99;}
.bad{color:#ff4444;}
</style>
</head>
<body>

<div class="box">

<h2>Chrome Extension Dashboard</h2>

<button onclick="track()">Simulate Activity</button>

<div id="out"></div>

</div>

<script>
function track(){

let sites = [
{site:"youtube.com", type:"unproductive"},
{site:"github.com", type:"productive"},
{site:"instagram.com", type:"unproductive"},
{site:"stackoverflow.com", type:"productive"}
];

let s = sites[Math.floor(Math.random()*sites.length)];

let cls = s.type=="productive" ? "good" : "bad";

out.innerHTML = `
<div class="card">Site: ${s.site}</div>
<div class="card ${cls}">Type: ${s.type}</div>
<div class="card">Time Spent: ${Math.floor(Math.random()*60)} mins</div>
`;
}
</script>

</body>
</html>
